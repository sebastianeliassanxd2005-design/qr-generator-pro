<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" rx="20" fill="#667eea"/>
  
  <!-- QR Code simplificado -->
  <rect x="20" y="20" width="25" height="25" rx="4" fill="white"/>
  <rect x="55" y="20" width="25" height="25" rx="4" fill="white"/>
  <rect x="20" y="55" width="25" height="25" rx="4" fill="white"/>
  
  <!-- Puntos QR internos -->
  <rect x="26" y="26" width="6" height="6" rx="2" fill="#667eea"/>
  <rect x="61" y="26" width="6" height="6" rx="2" fill="#667eea"/>
  <rect x="26" y="61" width="6" height="6" rx="2" fill="#667eea"/>
  
  <!-- Punto central decorativo -->
  <circle cx="75" cy="75" r="8" fill="white" opacity="0.9"/>
</svg>
